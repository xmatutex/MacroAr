<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacroAr — Herramientas de Análisis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body class="page-tools">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="MacroAr — ir al inicio">Macro<span>Ar</span></a>
      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="datos.html">Datos</a>
        <a href="herramientas.html" style="color: #fff;">Herramientas</a>
      </div>
      <div class="nav-actions"></div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-text">
        <p class="hero-eyebrow">Análisis Avanzado</p>
        <h1>Herramientas <em>Interactivas</em></h1>
        <p class="hero-sub">Manipulá períodos, agrupá datos y exportá la información</p>
      </div>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </section>

  <!-- Charts -->
  <section class="charts-section" id="indicadores">
    <div class="charts-inner">
      <div class="section-header">
        <h2>Panel de Control</h2>
        <p>Ajustá los parámetros de cada serie económica</p>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer id="fuentes">
    <div class="footer-inner">
      <div class="footer-logo">Macro<span>Ar</span></div>
      <p class="footer-desc">Visualización de datos macroeconómicos de Argentina.</p>
      <div class="footer-links">
        <a href="https://www.bcra.gob.ar" target="_blank">BCRA</a>
        <a href="https://apis.datos.gob.ar/series" target="_blank">datos.gob.ar</a>
        <a href="https://www.indec.gob.ar" target="_blank">INDEC</a>
      </div>
    </div>
  </footer>

  <script src="lib.js"></script>
  <script src="app.js"></script>
