name: Actualizar datos UTDT (ICC y EI)

# Baja las series de UTDT (Confianza del Consumidor e Expectativas de Inflación)
# directo de la web con fetch_utdt.py y commitea data/icc.json y data/ei.json.
# UTDT publica alrededor del día 20 de cada mes; corremos el 22.

on:
  schedule:
    # Día 22 de cada mes a las 12:00 UTC (09:00 ART)
    - cron: '0 12 22 * *'
  workflow_dispatch:  # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Traer datos de UTDT
        run: python fetch_utdt.py

      - name: Commitear si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "data: auto-update UTDT ICC/EI ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Sin cambios en los datos."
          fi
