name: Actualizar datos REM (BCRA)

# Baja las 9 series del Relevamiento de Expectativas de Mercado (REM) del BCRA
# directo de la web con fetch_rem.py y commitea los data/rem-*.json.
# El BCRA publica el REM a principios de cada mes; corremos el 10.

on:
  schedule:
    # Día 10 de cada mes a las 12:00 UTC (09:00 ART)
    - cron: '0 12 10 * *'
  workflow_dispatch:  # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Traer datos del REM
        run: python fetch_rem.py

      - name: Commitear si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "data: auto-update REM BCRA ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Sin cambios en los datos."
          fi
