<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacroAr — Detalle del Indicador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    .detalle-container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
      flex: 1; /* Para empujar el footer hacia abajo */
    }
    .detalle-header {
      margin-bottom: 2rem;
    }
    .detalle-title {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }
    .detalle-meta {
      color: var(--muted);
      font-size: 1rem;
    }
    .detalle-chart-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      padding: 2rem;
      height: 500px;
      position: relative;
      margin-bottom: 2rem;
    }
    .detalle-info {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      padding: 2rem;
      line-height: 1.6;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .btn-back:hover {
      color: #2563eb;
      text-decoration: underline;
    }
  </style>
</head>
<body class="page-detalle">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="MacroAr — ir al inicio">Macro<span>Ar</span></a>
      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="datos.html">Datos</a>
      </div>
      <div class="nav-actions"></div>
    </div>
  </nav>

  <!-- Contenedor Principal de la Vista Detallada -->
  <main class="detalle-container" id="detalle-container">
    <!-- Usa el historial del navegador para volver exactamente donde estábamos -->
    <a href="javascript:history.back()" class="btn-back">← Volver atrás</a>
    
    <div id="detalle-content">
      <p style="text-align: center; color: #64748b; padding: 2rem;">Cargando información ampliada del indicador...</p>
    </div>
  </main>

  <!-- Footer -->
  <footer id="fuentes">
    <div class="footer-inner">
      <div class="footer-logo">Macro<span>Ar</span></div>
      <p class="footer-desc">Visualización de datos macroeconómicos de Argentina.</p>
      <div class="footer-links">
        <a href="https://www.bcra.gob.ar" target="_blank">BCRA</a>
        <a href="https://apis.datos.gob.ar/series" target="_blank">datos.gob.ar</a>
        <a href="https://www.indec.gob.ar" target="_blank">INDEC</a>
      </div>
    </div>
  </footer>

  <script src="lib.js"></script>
  <script src="app.js"></script>
</body>
</html>
